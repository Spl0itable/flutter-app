plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}


def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.nym.bar"
    compileSdk = 36
    // Use NDK r27+ for 16 KB page-size support
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        // Required for libraries that use newer Java APIs on older Android versions
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
       release {
           keyAlias keystoreProperties['keyAlias']
           keyPassword keystoreProperties['keyPassword']
           storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
           storePassword keystoreProperties['storePassword']
       }
    }

    defaultConfig {
        applicationId "com.nym.bar"
        // Explicit floor (not flutter.minSdkVersion, which the AGP 8.9.1 upgrade
        // switched to) so the minimum required by flutter_webrtc / local_auth
        // (>=23) is pinned in-repo and can't silently drift with the Flutter SDK.
        // 24 matches the current flutter.minSdkVersion, so runtime coverage is
        // unchanged.
        minSdk = 24
        targetSdk = 36
        versionCode = 149
        versionName = flutter.versionName
        
        // Support all ABIs - AGP 8.9.1 automatically handles 16 KB alignment
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
    
    // Support for 16 KB page sizes: do not extract native libs
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Enable Java 8+ API desugaring across app and transitive dependencies
    // This satisfies AAR metadata requirements from flutter_local_notifications
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
